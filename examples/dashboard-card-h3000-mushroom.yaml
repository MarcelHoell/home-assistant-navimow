# Navimow H3000 — Mushroom version. Prettier than the core-card example, but
# needs two HACS frontend cards (Frontend category):
#   - "Mushroom"        for the mushroom-* cards
#   - "mini-graph-card" for the fixed 0-100% battery graph
# Without them the affected cards show "Custom element doesn't exist: ...".
#
# Real entity ids for a device named "Navimow H3000". Paste into
# "Add card" -> "Manual".

type: vertical-stack
cards:
  - type: custom:mushroom-title-card
    title: Navimow H3000

  # Main mower tile: icon and text follow the activity, greys out when off
  - type: custom:mushroom-template-card
    entity: lawn_mower.navimow_h3000
    icon: mdi:robot-mower
    primary: Navimow H3000
    secondary: |-
      {% set s = states('lawn_mower.navimow_h3000') %}
      {% set map = {
        'mowing': 'Mowing',
        'paused': 'Paused',
        'docked': 'Docked',
        'returning': 'Returning to dock',
        'error': 'Error',
        'unavailable': 'Switched off'
      } %}
      {{ map.get(s, s) }}
    icon_color: |-
      {% set s = states('lawn_mower.navimow_h3000') %}
      {{ {
        'mowing': 'green',
        'paused': 'orange',
        'docked': 'blue',
        'returning': 'teal',
        'error': 'red'
      }.get(s, 'disabled') }}
    tap_action:
      action: more-info

  # Command buttons — always all three, independent of activity.
  # horizontal-stack splits the width equally, so the three buttons are the
  # same size and span the full card width, flush with the title and graph.
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-template-card
        icon: mdi:play
        primary: Mow
        layout: vertical
        fill_container: true
        icon_color: green
        tap_action:
          action: perform-action
          perform_action: lawn_mower.start_mowing
          target:
            entity_id: lawn_mower.navimow_h3000
      - type: custom:mushroom-template-card
        icon: mdi:pause
        primary: Pause
        layout: vertical
        fill_container: true
        icon_color: orange
        tap_action:
          action: perform-action
          perform_action: lawn_mower.pause
          target:
            entity_id: lawn_mower.navimow_h3000
      - type: custom:mushroom-template-card
        icon: mdi:home-import-outline
        primary: Dock
        layout: vertical
        fill_container: true
        icon_color: blue
        tap_action:
          action: perform-action
          perform_action: lawn_mower.dock
          target:
            entity_id: lawn_mower.navimow_h3000

  # Status row — same full-width equal-size tiles as the buttons above.
  # Each handles the switched-off case (sensors go unavailable then) explicitly,
  # instead of showing a stray "unknown".
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-template-card
        entity: sensor.navimow_h3000_battery
        primary: >-
          {% set b = states('sensor.navimow_h3000_battery') %}
          {{ '—' if b in ['unknown', 'unavailable'] else b ~ '%' }}
        icon: >-
          {% set b = states('sensor.navimow_h3000_battery') %}
          {% if b in ['unknown', 'unavailable'] %} mdi:battery-off-outline
          {% elif b | int(0) >= 95 %} mdi:battery
          {% elif b | int(0) >= 30 %} mdi:battery-50
          {% else %} mdi:battery-alert {% endif %}
        icon_color: >-
          {% set b = states('sensor.navimow_h3000_battery') %}
          {% if b in ['unknown', 'unavailable'] %} disabled
          {% elif b | int(0) >= 30 %} green
          {% else %} red {% endif %}
        layout: vertical
        fill_container: true
        tap_action:
          action: more-info

      - type: custom:mushroom-template-card
        entity: binary_sensor.navimow_h3000_connectivity
        primary: >-
          {{ 'Cloud' if is_state('binary_sensor.navimow_h3000_connectivity', 'on') else 'Offline' }}
        icon: >-
          {{ 'mdi:cloud-check' if is_state('binary_sensor.navimow_h3000_connectivity', 'on')
             else 'mdi:cloud-off-outline' }}
        icon_color: >-
          {{ 'green' if is_state('binary_sensor.navimow_h3000_connectivity', 'on') else 'red' }}
        layout: vertical
        fill_container: true
        tap_action:
          action: more-info

      - type: custom:mushroom-template-card
        entity: sensor.navimow_h3000_error
        primary: >-
          {% set e = states('sensor.navimow_h3000_error') %}
          {% if e in ['unknown', 'unavailable'] %} Off
          {% elif e == 'none' %} OK
          {% else %} {{ e }} {% endif %}
        icon: >-
          {% set e = states('sensor.navimow_h3000_error') %}
          {% if e in ['unknown', 'unavailable'] %} mdi:power-off
          {% elif e == 'none' %} mdi:check-circle
          {% else %} mdi:alert-circle {% endif %}
        icon_color: >-
          {% set e = states('sensor.navimow_h3000_error') %}
          {% if e in ['unknown', 'unavailable'] %} disabled
          {% elif e == 'none' %} green
          {% else %} red {% endif %}
        layout: vertical
        fill_container: true
        tap_action:
          action: more-info

  # Battery on a fixed 0-100% scale (history-graph can't pin its axis)
  - type: custom:mini-graph-card
    name: Battery
    hours_to_show: 24
    points_per_hour: 2
    lower_bound: 0
    upper_bound: 100
    line_color: var(--green-color)
    entities:
      - entity: sensor.navimow_h3000_battery

  # Activity is categorical, so it stays a state timeline of its own
  - type: history-graph
    hours_to_show: 24
    entities:
      - entity: lawn_mower.navimow_h3000
